services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pbl5-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Timezone for scheduler/date logic
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
      - JAVA_OPTS=${JAVA_OPTS:--Duser.timezone=Asia/Ho_Chi_Minh}
      # Firebase (resolved by Spring relaxed binding)
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT:-file:/app/config/serviceAccountKey.json}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-pbl5-f21e6.firebasestorage.app}
      # IoT API key
      - IOT_API_KEY=${IOT_API_KEY:-pbl5-smart-trash-iot-key-2026-secure-dev-mode}
      # CORS (comma-separated)
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - ./backend/src/main/resources/serviceAccountKey.json:/app/config/serviceAccountKey.json:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v1/health" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    networks:
      - pbl5-network

networks:
  pbl5-network:
    driver: bridge
